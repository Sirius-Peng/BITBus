name: BITBusGrab
options:
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
targets:
  BITBusGrab:
    type: application
    platform: iOS
    sources:
      - path: ios/Sources
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ios/Sources/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.lingruo.bitbusgrab.ios
        PRODUCT_NAME: BITBusGrab
        TARGETED_DEVICE_FAMILY: "1,2"
    scheme:
      testTargets:
        - BITBusGrabTests
  BITBusGrabTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ios/Tests
    dependencies:
      - target: BITBusGrab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lingruo.bitbusgrab.iosTests
        PRODUCT_NAME: BITBusGrabTests
